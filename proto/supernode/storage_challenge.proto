syntax = "proto3";
package supernode;
option go_package = "github.com/LumeraProtocol/supernode/v2/gen/supernode";

// StorageChallengeService exposes minimal RPCs required to run epoch-anchored storage challenges off-chain.
service StorageChallengeService {
  rpc GetSliceProof(GetSliceProofRequest) returns (GetSliceProofResponse) {}
  rpc VerifySliceProof(VerifySliceProofRequest) returns (VerifySliceProofResponse) {}
  rpc GetCompoundProof(GetCompoundProofRequest) returns (GetCompoundProofResponse) {}
}

// ByteRange represents a half-open byte range [start, end) into an artifact.
message ByteRange {
  uint64 start = 1;
  uint64 end = 2; // exclusive
}

message GetCompoundProofRequest {
  string challenge_id = 1;
  uint64 epoch_id = 2;
  bytes seed = 3;
  string ticket_id = 4;
  string target_supernode_account = 5;
  string challenger_account = 6;
  repeated string observer_accounts = 7;
  uint32 artifact_class = 8;       // mirrors audittypes.StorageProofArtifactClass
  uint32 artifact_ordinal = 9;
  uint32 artifact_count = 10;
  uint32 bucket_type = 11;         // mirrors audittypes.StorageProofBucketType
  string artifact_key = 12;
  uint64 artifact_size = 13;
  repeated ByteRange ranges = 14;  // exactly LEP6CompoundRangesPerArtifact (=4); each size LEP6CompoundRangeLenBytes (=256)
}

message GetCompoundProofResponse {
  string challenge_id = 1;
  uint64 epoch_id = 2;
  string ticket_id = 3;
  uint32 artifact_class = 4;
  uint32 artifact_ordinal = 5;
  uint32 bucket_type = 6;
  string artifact_key = 7;
  repeated bytes range_bytes = 8;     // i-th matches i-th request range
  string proof_hash_hex = 9;          // BLAKE3(concat(range_bytes...)) lowercase hex
  string recipient_signature = 10;    // recipient's keyring signature
  bool ok = 11;
  string error = 12;
}

message GetSliceProofRequest {
  string challenge_id = 1;
  uint64 epoch_id = 2;
  bytes seed = 3;

  string file_key = 4;
  uint64 requested_start = 5;
  uint64 requested_end = 6;

  string challenger_id = 7;
  string recipient_id = 8;
  repeated string observer_ids = 9;
}

message GetSliceProofResponse {
  string challenge_id = 1;
  uint64 epoch_id = 2;

  string file_key = 3;
  uint64 start = 4;
  uint64 end = 5;

  string recipient_id = 6;
  bytes slice = 7;
  string proof_hash_hex = 8;

  bool ok = 9;
  string error = 10;
}

message VerifySliceProofRequest {
  string challenge_id = 1;
  uint64 epoch_id = 2;
  string file_key = 3;
  uint64 start = 4;
  uint64 end = 5;
  bytes slice = 6;
  string proof_hash_hex = 7;
  string challenger_id = 8;
  string recipient_id = 9;
}

message VerifySliceProofResponse {
  string challenge_id = 1;
  uint64 epoch_id = 2;
  string observer_id = 3;
  bool ok = 4;
  string error = 5;
}

